# Render Blueprint — one-click deploy of the API + landing page + Postgres.
# Dashboard → New → Blueprint → connect this repo → Apply.
# See DEPLOY.md for step-by-step instructions.
#
# Redis is intentionally omitted: the app degrades gracefully without it (in-process
# rate-limiting + DB-level dedup), and dropping it keeps the blueprint simple/robust.
# To add it later, create a Key Value instance in the Render dashboard and set REDIS_URL.

databases:
  - name: pdmr-db
    databaseName: pdmr
    user: pdmr
    plan: free # free Postgres (expires ~30 days; upgrade to keep it)

services:
  # The API + landing page. Runs migrations on boot, then serves; bootstraps real data
  # on first start via a background scrape (no paid worker needed).
  - type: web
    name: pdmr-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free # free web service (cold-starts after ~15 min idle)
    healthCheckPath: /health
    # retry the migration until Postgres is reachable (free-tier DB can lag the web boot),
    # then serve. The `until` loop keeps a single cold start from aborting on a transient DB blip.
    dockerCommand: sh -c "until uv run alembic upgrade head; do echo 'db not ready, retrying in 3s'; sleep 3; done && uv run uvicorn api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pdmr-db
          property: connectionString
      - key: USER_AGENT
        value: "PDMR-API-bot/0.1 (+contact@pdmr-api.example)"
      - key: LOG_LEVEL
        value: INFO
      - key: BOOTSTRAP_SCRAPE
        value: "true" # background-ingest real data on first boot
      - key: BOOTSTRAP_MAX_PAGES
        value: "2" # keep first-boot memory low on the 512 MB free instance (structured
        # sources ignore this; it only bounds the Italy PDF pagination). Raise once on a paid plan.
