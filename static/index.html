<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PDMR · Insider Transactions</title>
  <style>
    :root { color-scheme: light dark; }
    body { font: 15px/1.5 system-ui, sans-serif; margin: 0; padding: 2rem; max-width: 1100px; }
    h1 { margin: 0 0 .25rem; }
    .sub { opacity: .7; margin: 0 0 1.5rem; }
    .controls { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    button { padding: .4rem .8rem; cursor: pointer; border-radius: 6px; border: 1px solid #8888; background: transparent; }
    button.active { background: #2563eb; color: #fff; border-color: #2563eb; }
    table { border-collapse: collapse; width: 100%; font-variant-numeric: tabular-nums; }
    th, td { text-align: left; padding: .45rem .6rem; border-bottom: 1px solid #8883; }
    th { font-size: .8rem; text-transform: uppercase; letter-spacing: .03em; opacity: .7; }
    td.num { text-align: right; }
    .A { color: #16a34a; font-weight: 600; }
    .D { color: #dc2626; font-weight: 600; }
    .O { opacity: .6; }
    .empty { padding: 2rem; opacity: .6; }
  </style>
</head>
<body>
  <h1>PDMR — Italian Insider Transactions</h1>
  <p class="sub">Public Art. 19 MAR filings, parsed from the Allegato 3F form. Not investment advice.</p>

  <div class="controls">
    <button data-mode="signals" class="active">C-suite buy signals</button>
    <button data-mode="recent">All recent</button>
    <button data-mode="buys">Buys (A)</button>
    <button data-mode="sells">Sells (D)</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Date</th><th>Issuer</th><th>Insider</th><th>Type</th><th>Role</th>
        <th class="num">Price</th><th class="num">Volume</th><th class="num">Value (€)</th><th>Venue</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
  <div id="empty" class="empty" hidden>No transactions found.</div>

  <script>
    const ENDPOINTS = {
      signals: "/v1/signals?min_value=10000&limit=100",
      recent:  "/v1/transactions?limit=100",
      buys:    "/v1/transactions?type=A&limit=100",
      sells:   "/v1/transactions?type=D&limit=100",
    };
    const fmt = (n) => n == null ? "—" : Number(n).toLocaleString("en-US", { maximumFractionDigits: 2 });
    const FLAG = {IT:"🇮🇹",SE:"🇸🇪",NL:"🇳🇱",FR:"🇫🇷",BE:"🇧🇪",DE:"🇩🇪"};

    async function load(mode) {
      const res = await fetch(ENDPOINTS[mode]);
      const body = await res.json();
      const rows = document.getElementById("rows");
      const empty = document.getElementById("empty");
      rows.innerHTML = "";
      const data = body.data || [];
      empty.hidden = data.length > 0;
      for (const t of data) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${t.transaction_date || "—"}</td>
          <td>${FLAG[t.country] || "🇪🇺"} ${t.issuer_name || ""}</td>
          <td>${t.person_name || "—"}</td>
          <td class="${t.transaction_type}">${t.transaction_type}</td>
          <td>${t.role_code || "—"}</td>
          <td class="num">${fmt(t.price)}</td>
          <td class="num">${fmt(t.volume)}</td>
          <td class="num">${fmt(t.signal_value)}</td>
          <td>${t.venue || "—"}</td>`;
        rows.appendChild(tr);
      }
    }

    document.querySelectorAll("button[data-mode]").forEach((b) => {
      b.addEventListener("click", () => {
        document.querySelectorAll("button[data-mode]").forEach((x) => x.classList.remove("active"));
        b.classList.add("active");
        load(b.dataset.mode);
      });
    });
    load("signals");
  </script>
</body>
</html>
