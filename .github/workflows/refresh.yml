name: Keep data fresh

# Free auto-refresh with NO secrets: on a schedule, just *wake* the app (a plain /health ping).
# On wake the app itself re-scrapes when its data is stale (see BOOTSTRAP_STALE_HOURS), so no token
# and no GitHub secret are needed. Optional: set repo variable PDMR_BASE_URL for a different deploy.

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours (UTC) — adjust as you like
  workflow_dispatch: {} # manual "Run workflow" button

concurrency:
  group: pdmr-refresh
  cancel-in-progress: false

jobs:
  wake:
    runs-on: ubuntu-latest
    steps:
      - name: Wake the app (it also self-refreshes stale data on wake)
        run: |
          BASE="${{ vars.PDMR_BASE_URL || 'https://pdmr-api.onrender.com' }}"
          curl -fsS --retry 6 --retry-delay 15 --retry-all-errors "$BASE/health" -o /dev/null \
            && echo "awake" || echo "wake attempt done"
      - name: Trigger an explicit refresh (harmless 403 if no token set)
        env:
          TOKEN: ${{ secrets.PDMR_ADMIN_TOKEN }}
        run: |
          BASE="${{ vars.PDMR_BASE_URL || 'https://pdmr-api.onrender.com' }}"
          curl -sS "$BASE/v1/admin/refresh?token=$TOKEN&source=all" \
            -o /dev/null -w "refresh -> HTTP %{http_code}\n"
      - name: Report status
        run: |
          BASE="${{ vars.PDMR_BASE_URL || 'https://pdmr-api.onrender.com' }}"
          sleep 25
          curl -fsS "$BASE/status" | python3 -m json.tool || true
