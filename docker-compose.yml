services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: pdmr
      POSTGRES_PASSWORD: pdmr
      POSTGRES_DB: pdmr
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdmr -d pdmr"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    command: uv run uvicorn api.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql+asyncpg://pdmr:pdmr@postgres:5432/pdmr
      REDIS_URL: redis://redis:6379/0
      USER_AGENT: "PDMR-API-bot/0.1 (+contact@pdmr-api.example)"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["full"]

  scheduler:
    build: .
    command: uv run python -m scraper.scheduler
    environment:
      DATABASE_URL: postgresql+asyncpg://pdmr:pdmr@postgres:5432/pdmr
      REDIS_URL: redis://redis:6379/0
      USER_AGENT: "PDMR-API-bot/0.1 (+contact@pdmr-api.example)"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["full"]

volumes:
  pgdata:
  redisdata:
